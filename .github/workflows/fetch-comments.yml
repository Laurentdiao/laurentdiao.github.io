name: Fetch Email Comments

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-comments:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          submodules: false

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Fetch Comments
        env:
          BLOG_EMAIL: ${{ secrets.BLOG_EMAIL }}
          BLOG_EMAIL_PASSWORD: ${{ secrets.BLOG_EMAIL_PASSWORD }}
          BLOG_IMAP_SERVER: imap.gmail.com
          BLOG_IMAP_PORT: '993'
        run: python .github/scripts/fetch_comments.py

      - name: Commit Comments
        run: |
          git add source/data/comments.json .github/comments_state.json
          if git diff --cached --quiet; then
            echo "No comment changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update comments"
          git pull --rebase origin main
          git push origin HEAD:main
