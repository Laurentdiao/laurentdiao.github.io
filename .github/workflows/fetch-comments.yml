name: Fetch Email Comments

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-comments:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          submodules: false

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Fetch Comments
        env:
          BLOG_EMAIL: ${{ secrets.BLOG_EMAIL }}
          BLOG_EMAIL_PASSWORD: ${{ secrets.BLOG_EMAIL_PASSWORD }}
        run: python .github/scripts/fetch_comments.py

      - name: Commit Comments
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: 'Update comments'
          file_pattern: 'source/data/comments.json'
