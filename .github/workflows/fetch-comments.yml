name: Fetch Email Comments

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分钟运行一次
  workflow_dispatch:         # 允许手动触发

jobs:
  fetch-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --quiet --upgrade pip

      - name: Fetch Comments
        env:
          BLOG_EMAIL: ${{ secrets.BLOG_EMAIL }}
          BLOG_EMAIL_PASSWORD: ${{ secrets.BLOG_EMAIL_PASSWORD }}
        run: python .github/scripts/fetch_comments.py

      - name: Commit & Push if Updated
        run: |
          if [[ -s source/data/comments.json ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add source/data/comments.json
            git diff --staged --quiet || (git commit -m "📬 Update comments" && git push)
          fi
