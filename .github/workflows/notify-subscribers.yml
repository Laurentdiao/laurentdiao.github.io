name: Notify Email Subscribers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'source/_posts/**'
  workflow_dispatch:

jobs:
  notify-subscribers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2
          submodules: false

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install cryptography

      - name: Send Notifications
        env:
          BLOG_EMAIL: ${{ secrets.BLOG_EMAIL }}
          BLOG_EMAIL_PASSWORD: ${{ secrets.BLOG_EMAIL_PASSWORD }}
          SUBSCRIBERS_ENCRYPTION_KEY: ${{ secrets.SUBSCRIBERS_ENCRYPTION_KEY }}
          BLOG_SITE_URL: https://laurentdiao.github.io
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: python .github/scripts/send_subscription_notifications.py
