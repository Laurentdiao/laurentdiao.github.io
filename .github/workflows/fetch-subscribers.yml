name: Fetch Email Subscribers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch-subscribers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          submodules: false

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install cryptography

      - name: Fetch Subscribers
        env:
          BLOG_EMAIL: ${{ secrets.BLOG_EMAIL }}
          BLOG_EMAIL_PASSWORD: ${{ secrets.BLOG_EMAIL_PASSWORD }}
          BLOG_IMAP_SERVER: imap.gmail.com
          BLOG_IMAP_PORT: '993'
          SUBSCRIBERS_ENCRYPTION_KEY: ${{ secrets.SUBSCRIBERS_ENCRYPTION_KEY }}
        run: python .github/scripts/fetch_subscribers.py

      - name: Commit Subscribers
        run: |
          paths=()
          [ -f .github/subscribers.enc ] && paths+=(.github/subscribers.enc)
          [ -f .github/subscribers_state.json ] && paths+=(.github/subscribers_state.json)

          if [ ${#paths[@]} -eq 0 ]; then
            echo "No subscriber files were generated."
            exit 0
          fi

          git add "${paths[@]}"
          if git diff --cached --quiet; then
            echo "No subscriber changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update subscribers"
          git pull --rebase origin main
          git push origin HEAD:main
